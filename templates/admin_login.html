<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТАБАКМЕН - Админ вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-box {
            background: #111;
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
        }
        
        h1 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        input {
            width: 100%;
            padding: 15px;
            background: #222;
            border: 1px solid #333;
            border-radius: 10px;
            color: #ffd700;
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        
        button:hover {
            background: #ffed4a;
        }
        
        .error {
            color: #ff4444;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔐 Админ панель</h1>
        <form method="POST" onsubmit="return validateForm()">
            <input type="password" name="password" id="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
            <div class="error" id="error-msg">Неверный пароль</div>
        </form>
    </div>
    
    <script>
        function validateForm() {
            const password = document.getElementById('password').value;
            if (password !== 'tabakmen1823*4') {
                document.getElementById('error-msg').style.display = 'block';
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
