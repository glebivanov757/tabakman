<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение возраста - ТАБАКМЕН</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .age-box {
            background: #111;
            border: 2px solid #ffd700;
            border-radius: 30px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }
        
        h1 {
            color: #ffd700;
            font-size: 32px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .icon {
            font-size: 60px;
            margin: 20px 0;
        }
        
        p {
            color: #fff;
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        
        .warning {
            color: #ffd700;
            font-size: 14px;
            margin-bottom: 30px;
            padding: 15px;
            background: #222;
            border-radius: 10px;
            border-left: 3px solid #ffd700;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
        }
        
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-yes {
            background: #ffd700;
            color: #000;
        }
        
        .btn-yes:hover {
            background: #ffed4a;
            transform: scale(1.02);
        }
        
        .btn-no {
            background: #333;
            color: #fff;
        }
        
        .btn-no:hover {
            background: #444;
        }
        
        .footer {
            margin-top: 30px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="age-box">
        <h1>🚬 ТАБАКМЕН</h1>
        <div class="icon">🔞</div>
        <p>Подтверждение возраста</p>
        <div class="warning">
            ⚠️ На сайте представлена продукция, содержащая никотин. 
            Курение вредит вашему здоровью.
        </div>
        <p>Вам уже исполнилось 18 лет?</p>
        <form method="POST">
            <div class="buttons">
                <button type="submit" name="age" value="yes" class="btn btn-yes">✅ Да</button>
                <button type="submit" name="age" value="no" class="btn btn-no">❌ Нет</button>
            </div>
        </form>
        <div class="footer">
            Продажа несовершеннолетним запрещена
        </div>
    </div>
</body>
</html>
